<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Deal Advisor</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Car Deal Advisor</h1>
      <p class="subtitle">AI-assisted used car deal checker</p>

      <form id="deal-form">
        <div class="grid">
          <label>Brand <input name="brand" required /></label>
          <label>Model <input name="model" required /></label>
          <label>Year <input name="year" type="number" min="1990" max="2030" required /></label>
          <label>Mileage <input name="mileage" type="number" min="0" required /></label>
          <label>Price (USD) <input name="price" type="number" min="0" required /></label>
        </div>
        <button type="submit">Evaluate Deal</button>
      </form>

      <section id="result" class="result hidden"></section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
